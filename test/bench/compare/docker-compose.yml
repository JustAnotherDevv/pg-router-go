# Side-by-side bench: postgres + 3 poolers (pgbouncer, pgcat, pgrouter).
#
# Ports (host → container) — ALL bound to 127.0.0.1 only:
#   5432  postgres   (direct, baseline)
#   6432  pgbouncer
#   6433  pgcat
#   6434  pgrouter
#
# All poolers point at the same postgres backend, transaction-mode,
# pool_size=20, trust auth. Trust auth is safe here because the port
# is bound to localhost — only processes on this host can reach it.
# The bench runner (run.sh) connects via 127.0.0.1, so this works
# on a dev laptop, in CI (which uses its own services: block), and
# on a VPS where the host runs the bench directly.
#
# SECURITY NOTE: do NOT change the port bindings to "PORT:PORT"
# (which Docker interprets as 0.0.0.0:PORT). Postgres trust auth
# on a public port = full superuser RCE within seconds (mass
# scanner → COPY ... FROM PROGRAM → botnet).  See
# VPS_INCIDENT_POSTMORTEM.md (gitignored) for the full story.
#
# If you need a different bind (e.g., bench from another host on
# a private network), override the port mapping at the CLI:
#   docker compose -f test/bench/compare/docker-compose.yml run \
#     -p 5432:5432 postgres
# or edit the port mappings explicitly to a private CIDR.
#
# Boot:    docker compose up -d --build
# Run:     ./run.sh
# Teardown: docker compose down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: bench-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: trust   # safe: port bound to 127.0.0.1
    ports:
      - "127.0.0.1:5432:5432"            # localhost only, NOT 0.0.0.0
    command:
      - "postgres"
      - "-c"
      - "max_connections=500"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=2GB"
      - "-c"
      - "max_prepared_transactions=0"
      - "-c"
      - "log_min_duration_statement=-1"
      - "-c"
      - "fsync=off"           # bench-only: faster commits, NOT production
      - "-c"
      - "synchronous_commit=off"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 30

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: bench-pgbouncer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: trust
      ADMIN_USERS: postgres
    ports:
      - "127.0.0.1:6432:5432"             # localhost only

  pgcat:
    image: ghcr.io/postgresml/pgcat:latest
    container_name: bench-pgcat
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./pgcat/pgcat.toml:/etc/pgcat/pgcat.toml:ro
    command: ["pgcat", "/etc/pgcat/pgcat.toml"]
    ports:
      - "127.0.0.1:6433:6433"             # localhost only

  pgrouter:
    build:
      context: ../../..
      dockerfile: deploy/Dockerfile
      args:
        VERSION: bench
        COMMIT: bench
    image: pgrouter:bench
    container_name: bench-pgrouter
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./pgrouter/pgrouter.yaml:/etc/pgrouter/pgrouter.yaml:ro
    command: ["run", "--config", "/etc/pgrouter/pgrouter.yaml"]
    ports:
      - "127.0.0.1:6434:6434"             # localhost only
