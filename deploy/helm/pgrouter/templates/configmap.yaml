apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pgrouter.fullname" . }}-config
  labels:
    {{- include "pgrouter.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  pgrouter.yaml: |
{{ .Values.config | indent 4 }}
