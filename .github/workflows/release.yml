# Release pipeline.
#
# Triggered by pushing a v* tag (e.g. `git push origin v0.5.0-mvp`).
#
#   1. Checks out the tag.
#   2. Runs goreleaser, which:
#        - builds 9-arch binary matrix
#        - emits SBOMs
#        - publishes the GitHub Release with archives + checksums
#        - builds + pushes multi-arch images to ghcr.io
#        - signs everything via cosign (keyless, GitHub OIDC)
#
# Permissions:
#   contents: write        — create the GitHub Release + upload assets
#   packages: write        — push to ghcr.io
#   id-token: write        — request the OIDC token cosign exchanges
#                             for a short-lived Sigstore certificate

name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Setup QEMU (for arm64 docker buildx)
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Install syft (for SBOMs)
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # cosign keyless reads from OIDC; no key material in repo.
          COSIGN_EXPERIMENTAL: '1'
