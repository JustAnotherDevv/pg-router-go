# Test-only docker-compose: PG 15 + PG 16 with trust auth on different ports.
#
#   make deps-up    -> brings both up
#   make deps-down  -> tears down + removes volumes
#
# Production deploy lives in deploy/Dockerfile.
#
# SECURITY: ports bound to 127.0.0.1 only. Trust auth is safe here
# because the port is loopback-only. Do NOT change "127.0.0.1:PORT:5432"
# to "PORT:5432" — that would publish to 0.0.0.0 and combine with
# trust auth to give any internet scanner full superuser RCE.
# See scripts/check-compose-security.sh.

services:
  pg15:
    image: postgres:15
    container_name: pgrouter-test-pg15
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: testpw
      POSTGRES_DB: test
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "127.0.0.1:25515:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 2s
      timeout: 3s
      retries: 10

  pg16:
    image: postgres:16
    container_name: pgrouter-test-pg16
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: testpw
      POSTGRES_DB: test
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "127.0.0.1:25516:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 2s
      timeout: 3s
      retries: 10
