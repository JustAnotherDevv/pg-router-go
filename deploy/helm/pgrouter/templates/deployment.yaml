apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pgrouter.fullname" . }}
  labels:
    {{- include "pgrouter.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "pgrouter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pgrouter.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: pgrouter
          image: {{ include "pgrouter.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - run
            - --config
            - /etc/pgrouter/pgrouter.yaml
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: pgwire
              containerPort: 6432
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          {{- if .Values.healthcheck.enabled }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: {{ .Values.healthcheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: {{ .Values.healthcheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.periodSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/pgrouter
              readOnly: true
            {{- $hasSecrets := or .Values.secrets.userlistFile .Values.secrets.tlsClientCert .Values.secrets.adminToken }}
            {{- if $hasSecrets }}
            - name: secrets
              mountPath: /etc/pgrouter/secrets
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "pgrouter.fullname" . }}-config
        {{- $hasSecrets := or .Values.secrets.userlistFile .Values.secrets.tlsClientCert .Values.secrets.adminToken }}
        {{- if $hasSecrets }}
        - name: secrets
          secret:
            secretName: {{ include "pgrouter.fullname" . }}-secrets
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
