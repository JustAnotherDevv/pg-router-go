# Postgres backing service for pgrouter integration tests.
#
#   docker compose -f test/integration/docker-compose.yml up -d
#   go test -tags integration ./test/integration/...
#   docker compose -f test/integration/docker-compose.yml down
#
# The test harness (setup_test.go) builds + launches pgrouter on a
# free port pointing at this Postgres, so the tests themselves talk
# only to pgrouter (PGROUTER_DSN).

services:
  postgres:
    image: postgres:16-alpine
    container_name: pgrouter-it-pg
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - "25433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 1s
      timeout: 3s
      retries: 15
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "log_min_duration_statement=0"
