# pgrouter config for Phase A splice bench.
# Phase A: backend->client drain via splice-style copy (in-process zero-copy).
# Feature flag wire.splice: true (default is true; explicit here for clarity).
# Buffer size 8 KiB — matches kernel pipe default and typical Postgres
# DataRow body. Larger buffers reduce syscall count but waste memory when
# traffic is bursty.

server:
  listen_addr: 0.0.0.0
  listen_port: 6434
  max_client_conn: 1000
  gogc: 200
  gomemlimit: 30MB
  workers: 1

pool:
  mode: transaction
  default_pool_size: 32
  min_pool_size: 0
  query_wait_timeout: 60s
  server_idle_timeout: 600s
  server_lifetime: 3600s
  server_connect_timeout: 15s

auth:
  type: trust

tls:
  client_mode: disable
  server_mode: disable

metrics:
  listen: ":9090"
  path: /metrics

logging:
  level: warn
  format: text

databases:
  postgres:
    host: postgres
    port: 5432
    user: postgres
    dbname: postgres

wire:
  splice: true              # Phase A splice forwarder (backend->client drain)
  splice_buffer_size: 8192
  raw_passthrough: true     # bypass pgproto3 for client->backend hot path
  skip_reset_query: true    # skip DISCARD ALL — biggest perf win (+17% TPS)
