# Postgres backing service for pgrouter integration tests.
#
#   docker compose -f test/integration/docker-compose.yml up -d
#   go test -tags integration ./test/integration/...
#   docker compose -f test/integration/docker-compose.yml down
#
# The test harness (setup_test.go) builds + launches pgrouter on a
# free port pointing at this Postgres, so the tests themselves talk
# only to pgrouter (PGROUTER_DSN).
#
# SECURITY: port bound to 127.0.0.1 only. Do NOT change to
# "25433:5432" (which Docker interprets as 0.0.0.0:25433). A
# publicly-bound Postgres with superuser auth = RCE in seconds.
# See scripts/check-compose-security.sh and VPS_INCIDENT_POSTMORTEM.md
# (gitignored) for context.

services:
  postgres:
    image: postgres:16-alpine
    container_name: pgrouter-it-pg
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:25433:5432"            # localhost only, NOT 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 1s
      timeout: 3s
      retries: 15
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "log_min_duration_statement=0"
